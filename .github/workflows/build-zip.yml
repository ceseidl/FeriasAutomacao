name: Build ZIP

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  workflow_dispatch:  # permite acionar manualmente pela aba Actions

permissions:
  contents: write   # necessario para criar/atualizar a release "latest"

jobs:
  build:
    name: Empacotar e publicar ZIP
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Gerar ZIP enxuto (so arquivos necessarios + documentacao)
        id: zip
        run: |
          SHORT_SHA=$(git rev-parse --short HEAD)
          DATE=$(date -u +%Y%m%d-%H%M%S)
          ZIP_NAME="FeriasAutomacao-${DATE}-${SHORT_SHA}.zip"

          # Monta a estrutura final dentro de uma pasta-stage,
          # copiando APENAS o que o usuario final precisa.
          STAGE="FeriasAutomacao"
          mkdir -p "${STAGE}/assets" "${STAGE}/bin" "${STAGE}/docs"

          # Atalhos e launchers
          cp "Gerar Relatorio.lnk" "${STAGE}/"
          cp "Gerar Relatorio.bat" "${STAGE}/"

          # Logica do app
          cp gui.ps1            "${STAGE}/"
          cp executar.ps1       "${STAGE}/"
          cp template.md        "${STAGE}/"
          cp Ferias-template.xlsx "${STAGE}/"
          cp LICENSE            "${STAGE}/"

          # Recursos do HTML + icone
          cp assets/icon.ico    "${STAGE}/assets/"
          cp assets/style.css   "${STAGE}/assets/"
          cp assets/header.html "${STAGE}/assets/"
          cp assets/mermaid.lua "${STAGE}/assets/"

          # Instalador offline do Pandoc
          cp bin/pandoc-installer.msi "${STAGE}/bin/"

          # Documentacao (so o manual; screenshot ja esta embutido no docx)
          cp docs/MANUAL.docx   "${STAGE}/docs/"

          # Empacota a pasta-stage (o ZIP contem a pasta na raiz)
          zip -r "${ZIP_NAME}" "${STAGE}"

          # Copia com nome estavel pra release "latest"
          cp "${ZIP_NAME}" "FeriasAutomacao-latest.zip"

          echo "zip_name=${ZIP_NAME}" >> "$GITHUB_OUTPUT"
          echo "==> Conteudo do ZIP:"
          unzip -l "${ZIP_NAME}"
          echo "==> Tamanho:"
          ls -lh FeriasAutomacao-*.zip

      - name: Upload do artifact (90 dias)
        uses: actions/upload-artifact@v4
        with:
          name: FeriasAutomacao
          path: ${{ steps.zip.outputs.zip_name }}
          retention-days: 90

      - name: Atualizar release "latest" (push em main)
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Latest build (main)
          body: |
            Build automatico da branch `main`.

            - Commit: ${{ github.sha }}
            - Mensagem: ${{ github.event.head_commit.message }}
            - Disparado por: ${{ github.actor }}

            **Opcoes de download:**
            - `FeriasAutomacao-1.0.0.msi` - instalador (recomendado)
            - `FeriasAutomacao-latest.zip` - versao portatil

            Apos instalar/extrair, abra `docs/MANUAL.docx` e siga o
            passo-a-passo.

            Conteudo:
            - Scripts `gui.ps1`, `executar.ps1`, `template.md`
            - Planilha `Ferias-template.xlsx` (com sheets de referencia: Squads, Integrantes, Status)
            - Recursos `assets/` (icone, CSS, header, filtro Mermaid)
            - Instalador offline `bin/pandoc-installer.msi`
            - Manual `docs/MANUAL.docx` e `LICENSE`
          prerelease: false
          make_latest: "true"
          files: |
            ${{ steps.zip.outputs.zip_name }}
            FeriasAutomacao-latest.zip

      - name: Publicar release versionada (push de tag vX.Y.Z)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Ferias Automacao ${{ github.ref_name }}
          body: |
            Release oficial **${{ github.ref_name }}** do Ferias Automacao.

            **Como usar:** baixe `FeriasAutomacao-1.0.0.msi` (instalador
            recomendado) ou `FeriasAutomacao-latest.zip` (versao
            portatil), e siga o `docs/MANUAL.docx`.

            Conteudo:
            - Scripts `gui.ps1`, `executar.ps1`, `template.md`
            - Planilha `Ferias-template.xlsx` (com sheets de referencia: Squads, Integrantes, Status)
            - Recursos `assets/` (icone, CSS, header, filtro Mermaid)
            - Instalador offline `bin/pandoc-installer.msi`
            - Manual `docs/MANUAL.docx` e `LICENSE`
          prerelease: false
          files: |
            ${{ steps.zip.outputs.zip_name }}
            FeriasAutomacao-latest.zip

  msi:
    name: Empacotar e publicar MSI
    runs-on: windows-latest
    needs: build

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Instalar WiX 4
        shell: pwsh
        run: |
          dotnet tool install --global wix --version 4.0.6
          wix extension add WixToolset.UI.wixext/4.0.6 --global

      - name: Build do MSI
        shell: pwsh
        run: .\installer\build.ps1

      - name: Renomear MSI com data + sha
        id: msi
        shell: pwsh
        run: |
          $sha = (git rev-parse --short HEAD).Trim()
          $date = (Get-Date).ToUniversalTime().ToString('yyyyMMdd-HHmmss')
          $src = 'installer\output\FeriasAutomacao-1.0.0.msi'
          $dst = "FeriasAutomacao-1.0.0-$date-$sha.msi"
          Copy-Item $src $dst
          Copy-Item $src 'FeriasAutomacao-1.0.0.msi'
          "msi_name=$dst"               | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "msi_stable=FeriasAutomacao-1.0.0.msi" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          Write-Host "==> MSI: $dst"
          Get-ChildItem FeriasAutomacao-*.msi | Format-Table Name, Length

      - name: Upload do artifact (90 dias)
        uses: actions/upload-artifact@v4
        with:
          name: FeriasAutomacao-MSI
          path: ${{ steps.msi.outputs.msi_name }}
          retention-days: 90

      - name: Anexar MSI a release "latest" (push em main)
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          files: |
            ${{ steps.msi.outputs.msi_name }}
            FeriasAutomacao-1.0.0.msi

      - name: Anexar MSI a release versionada (tag vX.Y.Z)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: |
            ${{ steps.msi.outputs.msi_name }}
            FeriasAutomacao-1.0.0.msi
